<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="CodeShield Academy — learn web development, ethical hacking, IT & ICT, and internet literacy. Pay with M-Pesa.">
<title>CodeShield Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0E14;
    --surface: #131A24;
    --surface-2: #1B2430;
    --border: #2A3441;
    --cyan: #00D9C0;
    --violet: #7C5CFF;
    --amber: #FFB84D;
    --red: #FF5F57;
    --text: #E4E9F0;
    --text-muted: #7C8A9C;
    --font-display: 'Space Grotesk', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-display);
    line-height: 1.5;
    min-height: 100vh;
  }
  button, input, select, textarea { font-family: inherit; }
  button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible, a:focus-visible {
    outline: 2px solid var(--cyan); outline-offset: 2px;
  }

  /* terminal chrome */
  .term-bar {
    display: flex; align-items: center; gap: 16px;
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 50;
  }
  .term-dots { display: flex; gap: 6px; flex-shrink: 0; }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot.red { background: #FF5F57; }
  .dot.amber { background: #FEBC2E; }
  .dot.green { background: #28C840; }
  .term-path { font-family: var(--font-mono); font-size: 13px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .term-path .cyan { color: var(--cyan); }

  .nav-row { display: flex; gap: 4px; padding: 8px 16px; background: var(--surface); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .nav-link { font-family: var(--font-mono); font-size: 13px; color: var(--text-muted); background: none; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; white-space: nowrap; }
  .nav-link:hover, .nav-link.active { color: var(--cyan); background: var(--surface-2); }

  .storage-warning { display: none; background: rgba(255,184,77,0.1); border-bottom: 1px solid var(--amber); color: var(--amber); font-family: var(--font-mono); font-size: 12px; padding: 10px 16px; text-align: center; }

  .app { max-width: 1100px; margin: 0 auto; padding: 24px 16px 80px; }

  .hero { padding: 48px 0 32px; }
  .eyebrow { font-family: var(--font-mono); color: var(--cyan); font-size: 13px; margin-bottom: 12px; }
  .eyebrow::before { content: "> "; }
  h1.hero-title { font-size: clamp(28px, 6vw, 46px); font-weight: 700; letter-spacing: -0.02em; margin-bottom: 16px; }
  .hero-sub { color: var(--text-muted); font-size: 16px; max-width: 540px; margin-bottom: 28px; }
  .cursor { display: inline-block; width: 10px; height: 0.9em; background: var(--cyan); vertical-align: text-bottom; animation: blink 1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  .btn { font-family: var(--font-mono); font-size: 14px; padding: 12px 20px; border-radius: 8px; border: 1px solid transparent; cursor: pointer; font-weight: 500; transition: 0.15s; }
  .btn-primary { background: var(--cyan); color: #04121a; }
  .btn-primary:hover { box-shadow: 0 0 24px rgba(0,217,192,0.35); transform: translateY(-1px); }
  .btn-outline { background: transparent; border-color: var(--border); color: var(--text); }
  .btn-outline:hover { border-color: var(--cyan); color: var(--cyan); }
  .btn-violet { background: var(--violet); color: #fff; }
  .btn-violet:hover { box-shadow: 0 0 24px rgba(124,92,255,0.35); }
  .btn-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .btn-full { width: 100%; }

  .section-label { font-family: var(--font-mono); font-size: 13px; color: var(--text-muted); margin: 40px 0 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .track-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; }
  .track-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; cursor: pointer; transition: 0.15s; }
  .track-card:hover { border-color: var(--cyan); transform: translateY(-2px); }
  .track-card.static { cursor: default; }
  .track-card.static:hover { border-color: var(--border); transform: none; }
  .track-card .tname { font-weight: 600; margin-bottom: 6px; }
  .track-card .tcount { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); }

  .filter-row { display: flex; gap: 4px; padding: 0 0 20px; flex-wrap: wrap; }

  .course-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 14px; }
  .course-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px; cursor: pointer; transition: 0.15s; display: flex; flex-direction: column; gap: 10px; }
  .course-card:hover { border-color: var(--cyan); }
  .course-path { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); word-break: break-all; }
  .course-title { font-weight: 600; font-size: 16px; }
  .course-desc { color: var(--text-muted); font-size: 13px; flex: 1; }
  .course-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; gap: 8px; flex-wrap: wrap; }
  .price { font-family: var(--font-mono); color: var(--cyan); font-weight: 600; }
  .badge { font-family: var(--font-mono); font-size: 11px; padding: 3px 8px; border-radius: 20px; border: 1px solid var(--border); color: var(--text-muted); white-space: nowrap; }
  .status-pending { color: var(--amber); border-color: var(--amber); }
  .status-active { color: var(--cyan); border-color: var(--cyan); }

  .field { margin-bottom: 16px; }
  .field label { display: block; font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
  .field input, .field select, .field textarea {
    width: 100%; background: var(--surface-2); border: 1px solid var(--border); color: var(--text);
    padding: 12px 14px; border-radius: 8px; font-family: var(--font-display); font-size: 15px;
  }
  .field textarea { resize: vertical; font-family: var(--font-mono); font-size: 13px; }
  .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--cyan); }

  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; max-width: 480px; }

  .steps { list-style: none; counter-reset: step; margin: 16px 0; }
  .steps li { counter-increment: step; padding: 10px 0 10px 36px; position: relative; color: var(--text-muted); font-size: 14px; border-bottom: 1px solid var(--border); }
  .steps li:last-child { border-bottom: none; }
  .steps li::before { content: counter(step); position: absolute; left: 0; top: 8px; width: 22px; height: 22px; border-radius: 50%; background: var(--surface-2); border: 1px solid var(--cyan); color: var(--cyan); font-family: var(--font-mono); font-size: 11px; display: flex; align-items: center; justify-content: center; }
  .steps b { color: var(--text); font-weight: 600; }
  .steps .mono { font-family: var(--font-mono); color: var(--cyan); }

  .whatsapp-btn { display: flex; align-items: center; justify-content: center; gap: 8px; background: #25D366; color: #04240f; padding: 12px 18px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 14px; width: 100%; margin-bottom: 12px; }

  .table-wrap { overflow-x: auto; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 4px; margin-bottom: 24px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; font-family: var(--font-mono); color: var(--text-muted); font-weight: 500; padding: 10px 8px; border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
  td { padding: 10px 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
  tr:last-child td { border-bottom: none; }

  .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--border); flex-wrap: wrap; align-items: center; justify-content: space-between; }
  .tabs-left { display: flex; gap: 4px; flex-wrap: wrap; }
  .tab { font-family: var(--font-mono); font-size: 13px; padding: 10px 16px; background: none; border: none; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; }
  .tab.active { color: var(--cyan); border-color: var(--cyan); }
  .lock-link { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); background: none; border: none; cursor: pointer; padding: 8px; }
  .lock-link:hover { color: var(--red); }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--surface-2); border: 1px solid var(--cyan); color: var(--text); padding: 12px 20px; border-radius: 8px; font-size: 14px; z-index: 100; opacity: 0; transition: 0.25s; pointer-events: none; max-width: 90vw; text-align: center; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-6px); }

  footer { text-align: center; padding: 32px 16px; color: var(--text-muted); font-family: var(--font-mono); font-size: 12px; border-top: 1px solid var(--border); margin-top: 40px; }

  @media (max-width: 640px) {
    .app { padding: 16px 12px 80px; }
    .btn-row { flex-direction: column; }
    .panel { max-width: 100%; }
    .term-path { font-size: 11px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .cursor { animation: none; }
    * { transition: none !important; animation-duration: 0.01ms !important; }
  }
</style>
</head>
<body>

  <div class="term-bar">
    <div class="term-dots"><span class="dot red"></span><span class="dot amber"></span><span class="dot green"></span></div>
    <div class="term-path" id="termPath">ngash@codeshield:~$ <span class="cyan">home</span></div>
  </div>

  <div class="storage-warning" id="storageWarning">⚠ preview mode — data will not be saved outside this session. See notes for going live.</div>

  <div class="nav-row">
    <button class="nav-link" data-view="home" onclick="goTo('home')">home</button>
    <button class="nav-link" data-view="catalog" onclick="goTo('catalog')">courses</button>
    <button class="nav-link" data-view="dashboard" onclick="goTo('dashboard')">dashboard</button>
    <button class="nav-link" data-view="admin" onclick="goTo('admin')">admin</button>
  </div>

  <div class="app" id="app"></div>

  <div class="toast" id="toast"></div>

  <footer>CodeShield Academy — built for learners, secured by design</footer>

<script>
  // ---------- config ----------
  const PLATFORM_NAME = "CodeShield Academy";
  const PAYMENT_NUMBER = "254769489225";
  const WHATSAPP_NUMBER = "254769489225";
  const ADMIN_CODE = "ngash2026";

  const TRACKS = [
    { id: 'Web Development', label: 'Web Development', short: 'web-dev' },
    { id: 'Cybersecurity & Ethical Hacking', label: 'Cybersecurity & Ethical Hacking', short: 'security' },
    { id: 'IT & ICT', label: 'IT & ICT', short: 'it-ict' },
    { id: 'Internet & Digital Literacy', label: 'Internet & Digital Literacy', short: 'internet' },
  ];

  const DEFAULT_COURSES = [
    { id: 'c1', track: 'Web Development', title: 'HTML & CSS Foundations', description: 'Build the structure and style of modern websites from scratch.', price: 1000, modules: ['HTML document structure', 'CSS styling & the box model', 'Flexbox & Grid layout', 'Responsive design', 'Project: a portfolio page'] },
    { id: 'c2', track: 'Web Development', title: 'JavaScript Programming', description: 'Learn the language that powers interactive websites.', price: 1500, modules: ['JS fundamentals & syntax', 'DOM manipulation', 'Events & async JS', 'Working with APIs', 'Project: a dynamic web app'] },
    { id: 'c3', track: 'Web Development', title: 'Java Programming', description: 'Object-oriented programming with Java, from basics to small applications.', price: 1800, modules: ['Java syntax & OOP basics', 'Classes & objects', 'Collections & data structures', 'Exception handling', 'Project: a console app'] },
    { id: 'c4', track: 'Web Development', title: 'Ruby Programming', description: 'Clean, elegant programming with Ruby and an introduction to Rails.', price: 1500, modules: ['Ruby syntax & basics', 'Blocks, procs & OOP', 'Working with gems', 'Intro to Ruby on Rails', 'Project: a simple app'] },
    { id: 'c5', track: 'Web Development', title: 'Full-Stack Web Development', description: 'Combine front-end and back-end skills to ship complete web apps.', price: 3000, modules: ['Front-end review', 'Back-end servers & databases', 'Building REST APIs', 'Authentication basics', 'Capstone project'] },
    { id: 'c6', track: 'Cybersecurity & Ethical Hacking', title: 'Cybersecurity Fundamentals', description: 'Core security concepts, ethics, and the legal side of ethical hacking.', price: 2000, modules: ['CIA triad & security principles', 'Ethics & the law', 'Threats & attacker types', 'Security career paths'] },
    { id: 'c7', track: 'Cybersecurity & Ethical Hacking', title: 'Networking for Security', description: 'Understand TCP/IP, ports and protocols before you can secure them.', price: 2000, modules: ['OSI & TCP/IP models', 'Ports & protocols', 'Firewalls & VPNs', 'Packet analysis basics'] },
    { id: 'c8', track: 'Cybersecurity & Ethical Hacking', title: 'Ethical Hacking & Penetration Testing', description: 'A structured, authorized-only introduction to penetration testing methodology.', price: 3500, modules: ['Reconnaissance & OSINT', 'Vulnerability assessment', 'Web app security (OWASP Top 10)', 'Reporting & responsible disclosure'] },
    { id: 'c9', track: 'Cybersecurity & Ethical Hacking', title: 'Digital Forensics & Incident Response', description: 'How investigators trace, contain and respond to security incidents.', price: 2500, modules: ['Evidence handling basics', 'Log & artifact analysis', 'Incident response lifecycle', 'Case study walkthroughs'] },
    { id: 'c10', track: 'IT & ICT', title: 'IT & ICT Fundamentals', description: 'Hardware, operating systems and networks — the building blocks of IT.', price: 1200, modules: ['Computer hardware basics', 'Operating systems', 'Networking essentials', 'Intro to cloud computing'] },
    { id: 'c11', track: 'IT & ICT', title: 'Databases & SQL', description: 'Design and query relational databases with SQL.', price: 1500, modules: ['Relational database design', 'SQL queries & joins', 'Indexes & performance', 'Project: design a database'] },
    { id: 'c12', track: 'Internet & Digital Literacy', title: 'How the Internet Really Works', description: 'DNS, routing, ISPs and the infrastructure behind every website you visit.', price: 1000, modules: ['DNS & domains', 'How data travels (routing)', 'HTTP/HTTPS & browsers', 'Internet infrastructure basics'] },
    { id: 'c13', track: 'Internet & Digital Literacy', title: 'Dark Web & Online Privacy Awareness', description: 'A safety-first look at Tor, anonymity tools, and the realities and risks of the dark web.', price: 1500, modules: ['Surface, deep & dark web explained', 'Tor & onion routing concepts', 'Privacy & anonymity tools', 'Legal risks & staying safe'] },
  ];

  // ---------- storage layer (swap this out for a real backend when going live) ----------
  const hasStorage = (typeof window.storage !== 'undefined');
  async function dbGet(key, shared) {
    if (!hasStorage) return null;
    try { return await window.storage.get(key, !!shared); } catch (e) { return null; }
  }
  async function dbSet(key, value, shared) {
    if (!hasStorage) return null;
    try { return await window.storage.set(key, value, !!shared); } catch (e) { console.error('storage set failed', e); return null; }
  }
  async function dbList(prefix, shared) {
    if (!hasStorage) return null;
    try { return await window.storage.list(prefix, !!shared); } catch (e) { return null; }
  }

  // ---------- state ----------
  const state = {
    view: 'home',
    selectedCourseId: null,
    catalogFilter: 'all',
    profile: null,
    courses: DEFAULT_COURSES.slice(),
    students: [],
    payments: [],
    isAdmin: false,
    adminTab: 'courses',
    postLoginView: null,
  };

  // ---------- helpers ----------
  function escapeHtml(s) {
    const div = document.createElement('div');
    div.textContent = (s === undefined || s === null) ? '' : String(s);
    return div.innerHTML;
  }
  function slugify(s) {
    return String(s).toLowerCase().replace(/&/g, 'and').replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
  }
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
  }

  // ---------- navigation ----------
  function goTo(view, extra) {
    state.view = view;
    if (extra) Object.assign(state, extra);
    render();
    window.scrollTo(0, 0);
  }
  function goToCatalogTrack(trackId) {
    state.catalogFilter = trackId;
    goTo('catalog');
  }
  function setCatalogFilter(f) { state.catalogFilter = f; render(); }
  function setAdminTab(t) { state.adminTab = t; render(); }
  function lockAdmin() { state.isAdmin = false; goTo('home'); }

  // ---------- render root ----------
  function render() {
    document.getElementById('termPath').innerHTML = 'ngash@codeshield:~$ <span class="cyan">' + escapeHtml(state.view) + '</span>';
    document.querySelectorAll('.nav-row .nav-link').forEach(function (btn) {
      btn.classList.toggle('active', btn.dataset.view === state.view);
    });
    const map = {
      home: renderHome,
      catalog: renderCatalog,
      courseDetail: renderCourseDetail,
      onboarding: renderOnboarding,
      dashboard: renderDashboard,
      payment: renderPayment,
      paymentSuccess: renderPaymentSuccess,
      admin: renderAdmin,
    };
    (map[state.view] || renderHome)();
  }

  // ---------- views ----------
  function renderHome() {
    const trackCounts = {};
    state.courses.forEach(function (c) { trackCounts[c.track] = (trackCounts[c.track] || 0) + 1; });
    document.getElementById('app').innerHTML = '' +
      '<div class="hero">' +
        '<div class="eyebrow">welcome to codeshield academy</div>' +
        '<h1 class="hero-title">Learn to build the web<br>— and defend it<span class="cursor"></span></h1>' +
        '<p class="hero-sub">Practical courses in web development, ethical hacking, IT &amp; ICT, and internet literacy. Taught in plain language, paid for in KES.</p>' +
        '<div class="btn-row">' +
          '<button class="btn btn-primary" onclick="goTo(\'catalog\')">Browse courses</button>' +
          '<button class="btn btn-outline" onclick="goTo(\'onboarding\')">Get started</button>' +
        '</div>' +
      '</div>' +
      '<div class="section-label">~/tracks/</div>' +
      '<div class="track-grid">' +
        TRACKS.map(function (t) {
          return '<div class="track-card" onclick="goToCatalogTrack(\'' + t.id + '\')">' +
            '<div class="tname">' + escapeHtml(t.label) + '</div>' +
            '<div class="tcount">' + (trackCounts[t.id] || 0) + ' courses</div>' +
          '</div>';
        }).join('') +
      '</div>' +
      '<div class="section-label">~/why-codeshield/</div>' +
      '<div class="track-grid">' +
        '<div class="track-card static"><div class="tname">Learn at your pace</div><div class="tcount">Self-paced modules, revisit anytime</div></div>' +
        '<div class="track-card static"><div class="tname">Pay with M-Pesa</div><div class="tcount">No card needed — Pochi la Biashara</div></div>' +
        '<div class="track-card static"><div class="tname">Built for beginners</div><div class="tcount">Plain-language lessons, real projects</div></div>' +
      '</div>';
  }

  function renderCatalog() {
    const filter = state.catalogFilter || 'all';
    const filtered = filter === 'all' ? state.courses : state.courses.filter(function (c) { return c.track === filter; });
    const grouped = {};
    filtered.forEach(function (c) { (grouped[c.track] = grouped[c.track] || []).push(c); });

    document.getElementById('app').innerHTML = '' +
      '<div class="section-label">~/courses/</div>' +
      '<h2 style="margin-bottom:8px;">Course catalog</h2>' +
      '<div class="filter-row">' +
        '<button class="nav-link ' + (filter === 'all' ? 'active' : '') + '" onclick="setCatalogFilter(\'all\')">all</button>' +
        TRACKS.map(function (t) {
          return '<button class="nav-link ' + (filter === t.id ? 'active' : '') + '" onclick="setCatalogFilter(\'' + t.id + '\')">' + escapeHtml(t.short) + '</button>';
        }).join('') +
      '</div>' +
      (Object.keys(grouped).length === 0 ? '<p style="color:var(--text-muted);">No courses in this track yet.</p>' :
        Object.keys(grouped).map(function (track) {
          return '<div class="section-label">~/courses/' + slugify(track) + '/</div>' +
            '<div class="course-grid">' + grouped[track].map(courseCardHTML).join('') + '</div>';
        }).join('')
      );
  }

  function courseCardHTML(c) {
    return '<div class="course-card" onclick="goTo(\'courseDetail\', {selectedCourseId:\'' + c.id + '\'})">' +
      '<div class="course-path">~/' + slugify(c.track) + '/' + slugify(c.title) + '.course</div>' +
      '<div class="course-title">' + escapeHtml(c.title) + '</div>' +
      '<div class="course-desc">' + escapeHtml(c.description) + '</div>' +
      '<div class="course-foot">' +
        '<span class="price">KES ' + Number(c.price).toLocaleString() + '</span>' +
        '<span class="badge">' + (c.modules ? c.modules.length : 0) + ' modules</span>' +
      '</div>' +
    '</div>';
  }

  function renderCourseDetail() {
    const c = state.courses.find(function (x) { return x.id === state.selectedCourseId; });
    if (!c) { goTo('catalog'); return; }
    const enrollment = state.profile && state.profile.enrollments ? state.profile.enrollments.find(function (e) { return e.courseId === c.id; }) : null;
    document.getElementById('app').innerHTML = '' +
      '<button class="nav-link" style="padding-left:0;" onclick="goTo(\'catalog\')">&larr; back to courses</button>' +
      '<div class="course-path" style="margin:20px 0 8px;">~/' + slugify(c.track) + '/' + slugify(c.title) + '.course</div>' +
      '<h2 style="font-size:26px;margin-bottom:10px;">' + escapeHtml(c.title) + '</h2>' +
      '<span class="badge">' + escapeHtml(c.track) + '</span>' +
      '<p style="color:var(--text-muted);margin:16px 0;max-width:560px;">' + escapeHtml(c.description) + '</p>' +
      '<div class="section-label">~/modules/</div>' +
      '<ol style="padding-left:20px;color:var(--text-muted);line-height:2;max-width:560px;">' +
        (c.modules || []).map(function (m) { return '<li>' + escapeHtml(m) + '</li>'; }).join('') +
      '</ol>' +
      '<div class="panel" style="margin-top:28px;max-width:320px;">' +
        '<div class="price" style="font-size:24px;margin-bottom:16px;">KES ' + Number(c.price).toLocaleString() + '</div>' +
        (enrollment ?
          '<span class="badge ' + (enrollment.status === 'active' ? 'status-active' : 'status-pending') + '">' + (enrollment.status === 'active' ? 'enrolled' : 'payment pending') + '</span>' :
          '<button class="btn btn-primary btn-full" onclick="startEnroll(\'' + c.id + '\')">Enroll now</button>'
        ) +
      '</div>';
  }

  function startEnroll(courseId) {
    state.selectedCourseId = courseId;
    if (!state.profile) {
      state.postLoginView = 'payment';
      goTo('onboarding');
    } else {
      goTo('payment');
    }
  }

  function renderOnboarding() {
    const p = state.profile;
    document.getElementById('app').innerHTML = '' +
      '<div class="section-label">~/account/</div>' +
      '<div class="panel">' +
        '<h2 style="margin-bottom:6px;">Get started</h2>' +
        '<p style="color:var(--text-muted);font-size:13px;margin-bottom:20px;">Enter your details. If you have registered before with this email, we will load your courses.</p>' +
        '<div class="field"><label>full name</label><input id="nameInput" type="text" placeholder="Jane Wanjiru" value="' + (p ? escapeHtml(p.name) : '') + '"></div>' +
        '<div class="field"><label>email</label><input id="emailInput" type="email" placeholder="jane@email.com" value="' + (p ? escapeHtml(p.email) : '') + '"></div>' +
        '<div class="field"><label>phone (M-Pesa number)</label><input id="phoneInput" type="tel" placeholder="0712345678" value="' + (p ? escapeHtml(p.phone) : '') + '"></div>' +
        '<button class="btn btn-primary btn-full" onclick="submitProfile()">Continue</button>' +
      '</div>';
  }

  async function submitProfile() {
    const name = document.getElementById('nameInput').value.trim();
    const email = document.getElementById('emailInput').value.trim().toLowerCase();
    const phone = document.getElementById('phoneInput').value.trim();
    if (!name || !email || !phone) { showToast('Please fill in all fields'); return; }

    const studentKey = 'students:' + email;
    const existing = await dbGet(studentKey, true);
    let student;
    if (existing && existing.value) {
      try { student = JSON.parse(existing.value); } catch (e) { student = null; }
    }
    if (student) {
      student.name = name; student.phone = phone;
    } else {
      student = { name: name, email: email, phone: phone, joinedAt: new Date().toISOString(), enrollments: [] };
    }
    await dbSet(studentKey, JSON.stringify(student), true);
    await dbSet('myEmail', email, false);
    state.profile = student;

    const next = state.postLoginView || 'dashboard';
    state.postLoginView = null;
    goTo(next);
  }

  function renderDashboard() {
    if (!state.profile) { goTo('onboarding'); return; }
    const enrollments = state.profile.enrollments || [];
    document.getElementById('app').innerHTML = '' +
      '<div class="section-label">~/dashboard/' + slugify(state.profile.name) + '/</div>' +
      '<h2 style="margin-bottom:4px;">Welcome back, ' + escapeHtml(state.profile.name.split(' ')[0]) + '</h2>' +
      '<p style="color:var(--text-muted);font-size:13px;margin-bottom:24px;">' + escapeHtml(state.profile.email) + '</p>' +
      (enrollments.length === 0 ?
        '<div class="panel"><p style="color:var(--text-muted);margin-bottom:16px;">No courses yet.</p><button class="btn btn-primary" onclick="goTo(\'catalog\')">Browse courses</button></div>' :
        '<div class="course-grid">' + enrollments.map(function (e) {
          const c = state.courses.find(function (x) { return x.id === e.courseId; });
          if (!c) return '';
          return '<div class="course-card" onclick="goTo(\'courseDetail\',{selectedCourseId:\'' + c.id + '\'})">' +
            '<div class="course-path">~/' + slugify(c.track) + '/' + slugify(c.title) + '.course</div>' +
            '<div class="course-title">' + escapeHtml(c.title) + '</div>' +
            '<div class="course-foot"><span class="badge ' + (e.status === 'active' ? 'status-active' : 'status-pending') + '">' + (e.status === 'active' ? 'active' : 'payment pending') + '</span></div>' +
          '</div>';
        }).join('') + '</div>'
      ) +
      '<div class="section-label">~/more-courses/</div>' +
      '<button class="btn btn-outline" onclick="goTo(\'catalog\')">Browse all courses</button>';
  }

  function renderPayment() {
    const c = state.courses.find(function (x) { return x.id === state.selectedCourseId; });
    if (!c || !state.profile) { goTo('catalog'); return; }
    const waText = encodeURIComponent('Hi, I just paid for ' + c.title + ' on CodeShield Academy. Here is my M-Pesa confirmation.');
    document.getElementById('app').innerHTML = '' +
      '<button class="nav-link" style="padding-left:0;" onclick="goTo(\'courseDetail\',{selectedCourseId:\'' + c.id + '\'})">&larr; back</button>' +
      '<div class="section-label">~/payment/</div>' +
      '<div class="panel">' +
        '<h2 style="margin-bottom:4px;">' + escapeHtml(c.title) + '</h2>' +
        '<div class="price" style="font-size:22px;margin-bottom:20px;">KES ' + Number(c.price).toLocaleString() + '</div>' +
        '<p style="font-size:13px;color:var(--text-muted);margin-bottom:4px;">Pay via M-Pesa Pochi la Biashara:</p>' +
        '<ol class="steps">' +
          '<li>Go to M-Pesa on your phone</li>' +
          '<li>Select <b>Lipa na M-Pesa</b></li>' +
          '<li>Select <b>Pochi la Biashara</b></li>' +
          '<li>Enter <span class="mono">' + PAYMENT_NUMBER + '</span></li>' +
          '<li>Enter amount: KES ' + Number(c.price).toLocaleString() + '</li>' +
          '<li>Enter your M-Pesa PIN and confirm</li>' +
        '</ol>' +
        '<div class="field" style="margin-top:20px;"><label>M-Pesa confirmation code</label><input id="mpesaCodeInput" type="text" placeholder="e.g. QGH7X8YT2K"></div>' +
        '<button class="btn btn-primary btn-full" style="margin-bottom:12px;" onclick="submitPayment()">Submit payment code</button>' +
        '<a class="whatsapp-btn" href="https://wa.me/' + WHATSAPP_NUMBER + '?text=' + waText + '" target="_blank" rel="noopener">Send confirmation on WhatsApp</a>' +
        '<p style="font-size:12px;color:var(--text-muted);">Sending your screenshot on WhatsApp speeds up activation — your course unlocks once payment is verified.</p>' +
      '</div>';
  }

  async function submitPayment() {
    const mpesaCode = document.getElementById('mpesaCodeInput').value.trim();
    if (!mpesaCode) { showToast('Please enter your M-Pesa confirmation code'); return; }
    const c = state.courses.find(function (x) { return x.id === state.selectedCourseId; });
    if (!c) return;

    const payment = {
      id: 'p_' + Date.now(),
      studentEmail: state.profile.email,
      studentName: state.profile.name,
      courseId: c.id,
      courseTitle: c.title,
      amount: c.price,
      mpesaCode: mpesaCode,
      submittedAt: new Date().toISOString(),
      status: 'pending',
    };
    state.payments.push(payment);
    await dbSet('payments', JSON.stringify(state.payments), true);

    if (!state.profile.enrollments) state.profile.enrollments = [];
    if (!state.profile.enrollments.find(function (e) { return e.courseId === c.id; })) {
      state.profile.enrollments.push({ courseId: c.id, status: 'pending', enrolledAt: new Date().toISOString() });
    }
    await dbSet('students:' + state.profile.email, JSON.stringify(state.profile), true);

    goTo('paymentSuccess');
  }

  function renderPaymentSuccess() {
    document.getElementById('app').innerHTML = '' +
      '<div class="panel" style="text-align:center;max-width:420px;margin:0 auto;">' +
        '<div style="font-size:36px;margin-bottom:12px;color:var(--cyan);">&#10003;</div>' +
        '<h2 style="margin-bottom:8px;">Payment code submitted</h2>' +
        '<p style="color:var(--text-muted);font-size:14px;margin-bottom:20px;">We will activate your course once it is verified. Do not forget to send your screenshot on WhatsApp for faster activation.</p>' +
        '<button class="btn btn-primary" onclick="goTo(\'dashboard\')">Go to dashboard</button>' +
      '</div>';
  }

  // ---------- admin ----------
  function renderAdmin() {
    if (!state.isAdmin) {
      document.getElementById('app').innerHTML = '' +
        '<div class="section-label">~/admin/</div>' +
        '<div class="panel">' +
          '<h2 style="margin-bottom:6px;">Admin access</h2>' +
          '<p style="color:var(--text-muted);font-size:13px;margin-bottom:20px;">Enter your admin code to continue.</p>' +
          '<div class="field"><label>admin code</label><input id="adminCodeInput" type="password" placeholder="********"></div>' +
          '<button class="btn btn-violet btn-full" onclick="checkAdminCode()">Unlock admin</button>' +
        '</div>';
      return;
    }
    const tab = state.adminTab || 'courses';
    let content = '';
    if (tab === 'courses') content = adminCoursesHTML();
    else if (tab === 'students') content = adminStudentsHTML();
    else content = adminPaymentsHTML();

    const pendingCount = state.payments.filter(function (p) { return p.status === 'pending'; }).length;
    document.getElementById('app').innerHTML = '' +
      '<div class="section-label">~/admin/</div>' +
      '<div class="tabs">' +
        '<div class="tabs-left">' +
          '<button class="tab ' + (tab === 'courses' ? 'active' : '') + '" onclick="setAdminTab(\'courses\')">courses (' + state.courses.length + ')</button>' +
          '<button class="tab ' + (tab === 'students' ? 'active' : '') + '" onclick="setAdminTab(\'students\')">students (' + state.students.length + ')</button>' +
          '<button class="tab ' + (tab === 'payments' ? 'active' : '') + '" onclick="setAdminTab(\'payments\')">payments (' + pendingCount + ' pending)</button>' +
        '</div>' +
        '<button class="lock-link" onclick="lockAdmin()">lock &#128274;</button>' +
      '</div>' +
      content;
  }

  function checkAdminCode() {
    const code = document.getElementById('adminCodeInput').value;
    if (code === ADMIN_CODE) {
      state.isAdmin = true;
      loadAdminData().then(render);
    } else {
      showToast('Incorrect admin code');
    }
  }

  async function loadAdminData() {
    state.students = await loadAllStudents();
    const paymentsRes = await dbGet('payments', true);
    if (paymentsRes && paymentsRes.value) {
      try { state.payments = JSON.parse(paymentsRes.value); } catch (e) { state.payments = []; }
    } else {
      state.payments = [];
    }
  }

  async function loadAllStudents() {
    const listRes = await dbList('students:', true);
    if (!listRes || !listRes.keys) return [];
    const students = [];
    for (const key of listRes.keys) {
      const r = await dbGet(key, true);
      if (r && r.value) {
        try { students.push(JSON.parse(r.value)); } catch (e) {}
      }
    }
    return students;
  }

  function adminCoursesHTML() {
    return '' +
      '<div class="table-wrap"><table><thead><tr><th>title</th><th>track</th><th>price</th><th>modules</th><th></th></tr></thead><tbody>' +
        state.courses.map(function (c) {
          return '<tr>' +
            '<td>' + escapeHtml(c.title) + '</td>' +
            '<td>' + escapeHtml(c.track) + '</td>' +
            '<td>KES ' + Number(c.price).toLocaleString() + '</td>' +
            '<td>' + (c.modules ? c.modules.length : 0) + '</td>' +
            '<td><button class="lock-link" onclick="deleteCourse(\'' + c.id + '\')">delete</button></td>' +
          '</tr>';
        }).join('') +
      '</tbody></table></div>' +
      '<div class="panel" style="max-width:520px;">' +
        '<h3 style="margin-bottom:16px;">Add a course</h3>' +
        '<div class="field"><label>title</label><input id="newCourseTitle" type="text"></div>' +
        '<div class="field"><label>track</label><select id="newCourseTrack">' +
          TRACKS.map(function (t) { return '<option value="' + t.id + '">' + escapeHtml(t.label) + '</option>'; }).join('') +
        '</select></div>' +
        '<div class="field"><label>description</label><textarea id="newCourseDesc" rows="2"></textarea></div>' +
        '<div class="field"><label>price (KES)</label><input id="newCoursePrice" type="number" value="1500"></div>' +
        '<div class="field"><label>modules (one per line)</label><textarea id="newCourseModules" rows="4" placeholder="Intro to..."></textarea></div>' +
        '<button class="btn btn-primary" onclick="addCourse()">Add course</button>' +
      '</div>';
  }

  async function addCourse() {
    const title = document.getElementById('newCourseTitle').value.trim();
    const track = document.getElementById('newCourseTrack').value;
    const description = document.getElementById('newCourseDesc').value.trim();
    const price = parseInt(document.getElementById('newCoursePrice').value, 10);
    const modulesRaw = document.getElementById('newCourseModules').value.trim();
    if (!title || !description || !price) { showToast('Fill in title, description and price'); return; }
    const modules = modulesRaw ? modulesRaw.split('\n').map(function (s) { return s.trim(); }).filter(Boolean) : [];
    const course = { id: 'c_' + Date.now(), title: title, track: track, description: description, price: price, modules: modules };
    state.courses.push(course);
    await dbSet('courses', JSON.stringify(state.courses), true);
    render();
    showToast('Course added');
  }

  async function deleteCourse(courseId) {
    state.courses = state.courses.filter(function (c) { return c.id !== courseId; });
    await dbSet('courses', JSON.stringify(state.courses), true);
    render();
    showToast('Course deleted');
  }

  function adminStudentsHTML() {
    if (state.students.length === 0) return '<p style="color:var(--text-muted);">No students registered yet.</p>';
    return '<div class="table-wrap"><table><thead><tr><th>name</th><th>email</th><th>phone</th><th>courses</th></tr></thead><tbody>' +
      state.students.map(function (s) {
        return '<tr>' +
          '<td>' + escapeHtml(s.name) + '</td>' +
          '<td>' + escapeHtml(s.email) + '</td>' +
          '<td>' + escapeHtml(s.phone) + '</td>' +
          '<td>' + ((s.enrollments || []).length) + '</td>' +
        '</tr>';
      }).join('') +
    '</tbody></table></div>';
  }

  function adminPaymentsHTML() {
    if (state.payments.length === 0) return '<p style="color:var(--text-muted);">No payments submitted yet.</p>';
    const sorted = state.payments.slice().sort(function (a, b) { return new Date(b.submittedAt) - new Date(a.submittedAt); });
    return '<div class="table-wrap"><table><thead><tr><th>student</th><th>course</th><th>amount</th><th>code</th><th>status</th><th></th></tr></thead><tbody>' +
      sorted.map(function (p) {
        return '<tr>' +
          '<td>' + escapeHtml(p.studentName) + '<br><span style="color:var(--text-muted);font-size:11px;">' + escapeHtml(p.studentEmail) + '</span></td>' +
          '<td>' + escapeHtml(p.courseTitle) + '</td>' +
          '<td>KES ' + Number(p.amount).toLocaleString() + '</td>' +
          '<td style="font-family:var(--font-mono);">' + escapeHtml(p.mpesaCode) + '</td>' +
          '<td><span class="badge ' + (p.status === 'confirmed' ? 'status-active' : 'status-pending') + '">' + escapeHtml(p.status) + '</span></td>' +
          '<td>' + (p.status === 'pending' ? '<button class="lock-link" style="color:var(--cyan);" onclick="confirmPayment(\'' + p.id + '\')">confirm</button>' : '') + '</td>' +
        '</tr>';
      }).join('') +
    '</tbody></table></div>';
  }

  async function confirmPayment(paymentId) {
    const payment = state.payments.find(function (p) { return p.id === paymentId; });
    if (!payment) return;
    payment.status = 'confirmed';
    await dbSet('payments', JSON.stringify(state.payments), true);

    const studentKey = 'students:' + payment.studentEmail;
    const studentRes = await dbGet(studentKey, true);
    if (studentRes && studentRes.value) {
      let student;
      try { student = JSON.parse(studentRes.value); } catch (e) { student = null; }
      if (student) {
        student.enrollments = student.enrollments || [];
        const enrollment = student.enrollments.find(function (e) { return e.courseId === payment.courseId; });
        if (enrollment) { enrollment.status = 'active'; }
        else { student.enrollments.push({ courseId: payment.courseId, status: 'active', enrolledAt: new Date().toISOString() }); }
        await dbSet(studentKey, JSON.stringify(student), true);
        const idx = state.students.findIndex(function (s) { return s.email === student.email; });
        if (idx >= 0) state.students[idx] = student;
      }
    }
    render();
    showToast('Payment confirmed — course activated');
  }

  // ---------- init ----------
  async function init() {
    if (!hasStorage) {
      document.getElementById('storageWarning').style.display = 'block';
    }
    const coursesRes = await dbGet('courses', true);
    if (coursesRes && coursesRes.value) {
      try { state.courses = JSON.parse(coursesRes.value); } catch (e) { state.courses = DEFAULT_COURSES.slice(); }
    } else {
      state.courses = DEFAULT_COURSES.slice();
      await dbSet('courses', JSON.stringify(DEFAULT_COURSES), true);
    }

    const emailRes = await dbGet('myEmail', false);
    if (emailRes && emailRes.value) {
      const studentRes = await dbGet('students:' + emailRes.value, true);
      if (studentRes && studentRes.value) {
        try { state.profile = JSON.parse(studentRes.value); } catch (e) {}
      }
    }
    render();
  }

  init();
</script>
</body>
</html>
